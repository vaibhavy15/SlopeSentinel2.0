<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SlopeSentinel — Predict. Protect. Proceed.</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/auth.css">
<link rel="stylesheet" href="css/map.css">
<link rel="stylesheet" href="css/upload.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

</head>

<body>

<!-- LANDING -->
<div id="landing"></div>

<!-- AUTH -->
<div id="auth"></div>

<!-- DASHBOARD -->
<div id="dashboard"></div>

<script>

async function loadComponent(id, file){
    const res = await fetch(file);
    const html = await res.text();
    document.getElementById(id).innerHTML = html;
}

async function loadAll(){
    await loadComponent("landing","components/landing.html");
    await loadComponent("auth","components/auth.html");
    await loadComponent("dashboard","components/dashboard.html");
}

loadAll();

</script>

<script src="js/navigation.js"></script>
<script src="js/auth.js"></script>
<script src="js/charts.js"></script>
<script src="js/map.js"></script>
<script src="js/upload.js"></script>

</body>
</html>
